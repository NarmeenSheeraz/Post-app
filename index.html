<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    


    <div class="container">
        <div class="row align-items-start">
            <div class=" w-50 title-box mx-auto mt-5">
                <h1 class="text-center fw-bold mb-5">SignUp</h1>
                <div class="mb-3 w-75 mx-auto">
                    <label for="exampleFormControlInput1" class="form-label text-bdark fw-bold ">Name:</label>
                    <input type="text" class="form-control " id="name" required>
                </div>
                
                <div class="mb-3 w-75 mx-auto">
                    <label for="exampleFormControlInput1" class="form-label text-bdark fw-bold">Father Name:</label>
                    <input type="text" class="form-control" id="fname" required>
                </div>
                <div class="mb-3 w-75 mx-auto">
                    <label for="exampleFormControlInput1" class="form-label text-bdark fw-bold">Email:</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                
                <button class="btn btn-success px-4 mt-4 mx-auto d-block" type="submit"><a 
                        class="text-light fw-bold" id="login" onclick="login()">LogIn</a></button>
               

                
                
            </div>

            <div class="col-7 mt-4 " id="posts">

            </div>
        </div>
    </div>
    






    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>

</html>
